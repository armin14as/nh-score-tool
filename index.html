<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NH Score — Health Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Sportbox CI */
  --penn:      #09134F;   /* Penn Blue – primary dark */
  --neon:      #0019FF;   /* Neon Blue – accent/CTA */
  --peri:      #B5BCFF;   /* Periwinkle – light blue tint */
  --platinum:  #E9E9E9;   /* Platinum – background */
  --black:     #000000;
  --white:     #ffffff;

  /* Semantic mappings */
  --bg:        #F0F1FA;   /* very light periwinkle tint */
  --card:      #ffffff;
  --border:    #D8DAEE;
  --text:      #09134F;   /* Penn Blue for primary text */
  --muted:     #4A5080;
  --subtle:    #8890B8;
  --accent:    #0019FF;   /* Neon Blue */
  --accent-dk: #0013CC;

  --ok:        #1a7a4a;
  --ok-bg:     #edfaf3;
  --ok-bd:     #6ee7a8;
  --warn:      #7a5000;
  --warn-bg:   #fdf8ed;
  --warn-bd:   #f5c842;
  --err:       #8b1a1a;
  --err-bg:    #fdeeed;
  --err-bd:    #f5a0a0;
}

body {
  font-family: 'Barlow', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ─────────────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--penn);
  height: 56px; display: flex; align-items: center; padding: 0 2rem; gap: 1.5rem;
}
.nav-brand {
  font-size: 13px; font-weight: 800; color: var(--white);
  white-space: nowrap; letter-spacing: 0.08em; text-transform: uppercase;
}
.nav-brand span { color: var(--peri); }
.nav-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
.nav-progress { flex: 1; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
.nav-progress-fill { height: 100%; background: var(--neon); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
.nav-right { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
.nav-counter { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; font-variant-numeric: tabular-nums; font-weight: 600; }
.nav-btn {
  height: 30px; padding: 0 14px; font: 600 11px 'Barlow', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.25); border-radius: 4px;
  background: transparent; color: rgba(255,255,255,0.7); cursor: pointer;
  transition: all 0.15s;
}
.nav-btn:hover { border-color: rgba(255,255,255,0.6); color: var(--white); }
.nav-btn.accent { background: var(--neon); border-color: var(--neon); color: #fff; }
.nav-btn.accent:hover { opacity: 0.85; }

/* ── APP ─────────────────────────────────────────── */
.app {
  min-height: 100vh; padding-top: 56px;
  display: flex; align-items: center; justify-content: center;
  padding-left: 1rem; padding-right: 1rem;
}

/* ── INTRO ───────────────────────────────────────── */
.screen-intro { max-width: 540px; width: 100%; padding: 4rem 2rem; text-align: center; }
.intro-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--penn); color: var(--peri);
  font-size: 11px; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; padding: 7px 18px; border-radius: 20px;
  margin-bottom: 1.5rem;
}
.intro-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--neon); flex-shrink: 0;
}
.intro-eyebrow {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--neon); margin-bottom: 1rem;
}
.intro-title {
  font-size: 46px; font-weight: 900; color: var(--penn);
  letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 1.25rem;
  text-transform: uppercase;
}
.intro-sub {
  font-size: 16px; color: var(--muted); line-height: 1.6;
  margin-bottom: 2rem; max-width: 380px; margin-left: auto; margin-right: auto;
}
.intro-cats { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 2.5rem; }
.intro-cat {
  font-size: 11px; font-weight: 700; color: var(--penn);
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 6px 14px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.btn-start {
  height: 54px; padding: 0 2.5rem;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent; font: 800 14px 'Barlow', sans-serif;
  background: var(--neon); color: #fff; border: none; border-radius: 10px;
  cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase;
  transition: opacity 0.15s; box-shadow: 0 6px 24px rgba(0,25,255,0.35);
  width: 100%; max-width: 320px;
}
.btn-start:hover { opacity: 0.88; }
.btn-start:active { transform: scale(0.97); transition-duration: 0.08s; }
.intro-meta { font-size: 12px; color: var(--subtle); margin-top: 1rem; font-weight: 500; }

/* ── QUESTION ────────────────────────────────────── */
.screen-question { width: 100%; max-width: 640px; padding: 3rem 2rem 2rem; }

.q-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 2.5rem; gap: 2rem;
}
.q-cat-name {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--neon);
}
.q-progress-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.q-progress-label { font-size: 12px; color: var(--subtle); font-variant-numeric: tabular-nums; }
.q-dots { display: flex; gap: 4px; }
.q-dot {
  height: 4px; border-radius: 2px; background: var(--border);
  transition: background 0.2s, width 0.2s; width: 18px;
}
.q-dot.done   { background: var(--neon); }
.q-dot.active { background: var(--neon); width: 28px; }

.q-text {
  font-size: 24px; font-weight: 700; color: var(--penn);
  line-height: 1.3; letter-spacing: -0.01em; margin-bottom: 2rem;
}

/* Options */
.q-options { display: flex; flex-direction: column; gap: 10px; }

.q-option {
  display: flex; align-items: center; gap: 18px;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  padding: 16px 20px; background: var(--white);
  border: 1.5px solid var(--border); border-radius: 12px;
  cursor: pointer; transition: all 0.15s;
  user-select: none;
}
.q-option:hover { border-color: var(--peri); background: #F5F6FF; box-shadow: 0 2px 12px rgba(0,25,255,0.08); }
.q-option:active { transform: scale(0.985); transition-duration: 0.08s; }

.q-option.sel-0 { border-color: var(--err-bd); background: var(--err-bg); }
.q-option.sel-1 { border-color: var(--warn-bd); background: var(--warn-bg); }
.q-option.sel-2 { border-color: var(--neon); background: #EEF0FF; box-shadow: 0 2px 16px rgba(0,25,255,0.12); }

.q-icon {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800;
  background: var(--bg); border: 1.5px solid var(--border);
  color: var(--subtle); transition: all 0.15s;
}
.q-option:hover .q-icon { background: var(--peri); border-color: var(--peri); color: var(--penn); }
.q-option.sel-0 .q-icon { background: var(--err-bg); border-color: var(--err-bd); color: var(--err); }
.q-option.sel-1 .q-icon { background: var(--warn-bg); border-color: var(--warn-bd); color: var(--warn); }
.q-option.sel-2 .q-icon { background: var(--neon); border-color: var(--neon); color: #fff; }

.q-label { font-size: 17px; font-weight: 600; color: var(--penn); letter-spacing: 0; }
.q-option.sel-2 .q-label { color: var(--neon); }

/* Slider */
.q-slider-wrap { padding: 22px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
.q-slider-val {
  font-size: 30px; font-weight: 700; color: var(--text);
  letter-spacing: -0.03em; margin-bottom: 18px; font-variant-numeric: tabular-nums;
}
.q-slider-val.good   { color: var(--ok); }
.q-slider-val.medium { color: var(--warn); }
.q-slider-val.bad    { color: var(--err); }
input[type=range].q-range {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; border-radius: 2px;
  background: var(--border); outline: none; cursor: pointer; margin-bottom: 10px;
}
input[type=range].q-range::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--neon); cursor: pointer;
  border: 3px solid #fff; box-shadow: 0 0 0 1px var(--peri);
}
input[type=range].q-range::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--neon); border: 3px solid #fff; cursor: pointer;
}
.q-slider-lbls { display: flex; justify-content: space-between; font-size: 11px; color: var(--subtle); }
.q-slider-hint { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 16px; }

/* Calc */
.q-calc-wrap { padding: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
.q-calc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px,1fr)); gap: 12px; margin-bottom: 14px; }
.q-calc-field { display: flex; flex-direction: column; gap: 6px; }
.q-calc-field label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--subtle); }
.q-calc-field input[type=number] {
  height: 36px; padding: 0 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); font: 14px 'Inter', sans-serif;
  outline: none; width: 100%; font-variant-numeric: tabular-nums; transition: border-color 0.1s;
}
.q-calc-field input[type=number]:focus { border-color: var(--neon); }
.q-calc-gender { display: flex; gap: 6px; }
.q-calc-gender button {
  flex: 1; height: 36px; border: 1px solid var(--border); background: var(--bg);
  color: var(--muted); font: 500 13px 'Inter', sans-serif; border-radius: 6px; cursor: pointer; transition: all 0.1s;
}
.q-calc-gender button.active { background: var(--neon); border-color: var(--neon); color: #fff; }
.q-calc-result {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); transition: all 0.2s;
}
.q-calc-result.good   { border-left: 3px solid var(--ok);   background: var(--ok-bg); }
.q-calc-result.medium { border-left: 3px solid var(--warn); background: var(--warn-bg); }
.q-calc-result.bad    { border-left: 3px solid var(--err);  background: var(--err-bg); }
.q-calc-result-val { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.q-calc-result.good   .q-calc-result-val { color: var(--ok); }
.q-calc-result.medium .q-calc-result-val { color: var(--warn); }
.q-calc-result.bad    .q-calc-result-val { color: var(--err); }
.q-calc-result-lbl { font-size: 12px; color: var(--muted); }

/* Bottom nav */
.q-nav {
  display: flex; align-items: center; justify-content: space-between; margin-top: 2rem;
}
.q-back {
  height: 44px; padding: 0 20px; font: 700 12px 'Barlow', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.q-back:hover { border-color: var(--penn); color: var(--penn); }
.q-back:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
.q-skip { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--subtle); background: none; border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
.q-skip:hover { color: var(--muted); }
.q-next {
  height: 44px; padding: 0 28px;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent; font: 700 13px 'Barlow', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
  background: var(--neon); color: #fff; border: none; border-radius: 8px;
  cursor: pointer; transition: opacity 0.15s;
  box-shadow: 0 4px 16px rgba(0,25,255,0.25);
}
.q-next:hover { opacity: 0.88; }
.q-next:disabled { opacity: 0.3; cursor: default; pointer-events: none; box-shadow: none; }

/* ── RESULTS ─────────────────────────────────────── */
.screen-results { width: 100%; max-width: 560px; padding: 2.5rem 1rem 3rem; }

.r-hero {
  background: var(--penn); border-radius: 16px;
  padding: 2rem 2rem 1.75rem; margin-bottom: 1.5rem;
  text-align: center;
}
.r-eyebrow {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--peri); margin-bottom: 1rem;
}
.r-score-wrap { display: flex; align-items: baseline; justify-content: center; gap: 6px; margin-bottom: 4px; }
.r-score {
  font-size: 80px; font-weight: 900; color: var(--white);
  letter-spacing: -0.04em; line-height: 1; font-variant-numeric: tabular-nums;
}
.r-score-max { font-size: 28px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: -0.02em; }
.r-sub { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 1.5rem; font-weight: 500; }
.r-gauge {
  width: 100%; height: 6px; background: rgba(255,255,255,0.15);
  border-radius: 3px; overflow: hidden;
}
.r-gauge-fill {
  height: 100%; background: var(--neon); border-radius: 3px;
  width: 0%; transition: width 1s cubic-bezier(0.4,0,0.2,1);
}

.r-breakdown {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 1.5rem;
}
.r-cat {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.r-cat-name {
  font-size: 11px; font-weight: 700; color: var(--subtle);
  text-transform: uppercase; letter-spacing: 0.07em;
}
.r-cat-score {
  font-size: 28px; font-weight: 900; color: var(--penn);
  letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
  line-height: 1;
}
.r-cat-score span { font-size: 14px; font-weight: 500; color: var(--subtle); }
.r-bar-track { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.r-bar-fill { height: 100%; background: var(--neon); border-radius: 2px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
.r-pct { font-size: 12px; color: var(--neon); font-weight: 700; font-variant-numeric: tabular-nums; }

.r-actions { display: flex; gap: 10px; }
.r-btn {
  height: 48px; padding: 0 24px; font: 700 12px 'Barlow', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
  border-radius: 8px; cursor: pointer;
  border: 1.5px solid var(--border); background: var(--white); color: var(--penn); transition: opacity 0.1s;
}
.r-btn.primary { background: var(--neon); border-color: var(--neon); color: #fff; box-shadow: 0 4px 16px rgba(0,25,255,0.25); flex: 1; }
.r-btn:hover { opacity: 0.82; }

/* ══════════════════════════════════════════════════
   RESPONSIVE — all breakpoints
   320px  iPhone SE
   390px  iPhone 14
   430px  iPhone 14 Pro Max
   768px  iPad Mini / portrait tablet
   1024px iPad / small laptop
   1280px+ Desktop
   ══════════════════════════════════════════════════ */

/* ── Large desktop (1280+) ── */
@media (min-width: 1280px) {
  .screen-intro    { padding: 5rem 2rem; }
  .screen-question { padding: 4rem 2rem 2.5rem; max-width: 680px; }
  .screen-results  { padding: 3rem 1rem 4rem; max-width: 600px; }
  .intro-title     { font-size: 52px; }
  .q-text          { font-size: 26px; }
}

/* ── Tablet portrait (768-1023) ── */
@media (max-width: 1023px) and (min-width: 601px) {
  .app { align-items: flex-start; padding-top: 56px; }
  .screen-intro    { padding: 3rem 2rem; max-width: 520px; }
  .screen-question { padding: 2.5rem 2rem; }
  .screen-results  { padding: 2rem 1rem 3rem; }
  .q-text          { font-size: 22px; }
  .intro-title     { font-size: 40px; }
}

/* ── Mobile (≤600px) — primary mobile experience ── */
@media (max-width: 600px) {
  /* Nav */
  .nav {
    padding: 0 1rem; gap: 0.75rem; height: 52px;
  }
  .nav-brand   { font-size: 12px; letter-spacing: 0.06em; }
  .nav-counter { display: none; }
  .nav-divider { display: none; }
  .nav-btn     { height: 28px; padding: 0 10px; font-size: 10px; }

  /* App wrapper */
  .app {
    padding-top: 52px;
    padding-bottom: 76px;   /* space for fixed bottom nav */
    padding-left: 0;
    padding-right: 0;
    align-items: flex-start;
    min-height: 100dvh;
  }

  /* ── INTRO ── */
  .screen-intro {
    padding: 2.25rem 1.25rem 2rem;
    max-width: 100%;
  }
  .intro-badge     { font-size: 10px; padding: 6px 14px; margin-bottom: 1.25rem; }
  .intro-title     { font-size: 38px; line-height: 1.0; margin-bottom: 1rem; }
  .intro-sub       { font-size: 15px; margin-bottom: 1.5rem; max-width: 320px; }
  .intro-cats      { gap: 6px; margin-bottom: 2rem; }
  .intro-cat       { font-size: 10px; padding: 5px 12px; }
  .btn-start       { max-width: 100%; height: 56px; font-size: 15px; border-radius: 12px; }
  .intro-meta      { font-size: 11px; }

  /* ── QUESTION ── */
  .screen-question {
    padding: 1.5rem 1.25rem 0;
    max-width: 100%;
    min-height: calc(100dvh - 52px - 76px);
    display: flex;
    flex-direction: column;
  }
  .q-header        { margin-bottom: 1.5rem; gap: 0.75rem; align-items: center; }
  .q-cat-name      { font-size: 10px; letter-spacing: 0.1em; }
  .q-progress-label{ font-size: 11px; }
  .q-dot           { width: 14px; }
  .q-dot.active    { width: 22px; }
  .q-text {
    font-size: 20px; line-height: 1.3;
    margin-bottom: 1.25rem;
    /* Let text push options down naturally */
  }
  .q-options { gap: 8px; }
  .q-option  { padding: 15px 16px; border-radius: 14px; gap: 14px; min-height: 60px; }
  .q-icon    { width: 40px; height: 40px; font-size: 16px; border-radius: 50%; }
  .q-label   { font-size: 16px; }

  /* Slider on mobile */
  .q-slider-wrap { padding: 18px; border-radius: 14px; }
  .q-slider-val  { font-size: 26px; }
  input[type=range].q-range::-webkit-slider-thumb { width: 28px; height: 28px; }
  input[type=range].q-range { height: 6px; }

  /* Calc on mobile */
  .q-calc-wrap { padding: 16px; border-radius: 14px; }
  .q-calc-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .q-calc-field input[type=number] { height: 46px; font-size: 16px; }
  .q-calc-gender button { height: 46px; font-size: 14px; }

  /* Fixed bottom nav */
  .q-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 10px 1.25rem calc(10px + env(safe-area-inset-bottom, 0px));
    background: var(--white);
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(9,19,79,0.1);
    z-index: 200;
    display: grid;
    grid-template-columns: 52px 1fr 1fr;
    align-items: center;
    gap: 8px;
  }
  .q-back {
    height: 52px; width: 52px; padding: 0;
    border-radius: 12px; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  /* Replace text with just arrow on small screens */
  .q-back-text { display: none; }
  .q-skip      { display: none; }   /* hide skip — redundant with just arrow back */
  .q-next {
    height: 52px; border-radius: 12px;
    font-size: 13px; padding: 0 16px;
    letter-spacing: 0.05em;
    box-shadow: 0 3px 14px rgba(0,25,255,0.3);
    width: 100%;
  }

  /* ── RESULTS ── */
  .screen-results  { padding: 1.25rem 1.25rem 1.5rem; max-width: 100%; }
  .r-hero          { border-radius: 14px; padding: 1.5rem 1.25rem 1.25rem; margin-bottom: 1.25rem; }
  .r-score         { font-size: 68px; }
  .r-score-max     { font-size: 22px; }
  .r-sub           { font-size: 13px; margin-bottom: 1.25rem; }
  .r-breakdown     { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
  .r-cat           { padding: 14px; border-radius: 12px; gap: 8px; }
  .r-cat-name      { font-size: 10px; }
  .r-cat-score     { font-size: 22px; }
  .r-actions       { flex-direction: column; gap: 8px; }
  .r-btn           { height: 52px; width: 100%; font-size: 13px; }
}

/* ── iPhone SE / small phones (≤375px) ── */
@media (max-width: 375px) {
  .intro-title  { font-size: 32px; }
  .intro-sub    { font-size: 14px; }

}

/* ── Landscape mobile ── */
@media (max-width: 900px) and (orientation: landscape) and (max-height: 430px) {
  .app           { align-items: flex-start; padding-top: 52px; padding-bottom: 0; }
  .screen-intro  { padding: 1.5rem 2rem; }
  .intro-title   { font-size: 28px; line-height: 1.1; }

</div>

<script>
const CATS = [
  { title:'Schlaf & Erholung', questions:[
    {text:'Bist du vor 22:00 Uhr im Bett und gehst du jeden Abend zur gleichen Zeit ins Bett (±15 Minuten)?',options:['Nein','Teilweise','Ja']},
    {text:'Schläfst du jede Nacht durch, ohne aufzuwachen oder zur Toilette zu gehen?',options:['Nein','Teilweise','Ja']},
    {text:'Wachst du 6–8 Stunden später ohne Wecker auf und fühlst dich energiegeladen (Energielevel 8–10)?',options:['Nein','Teilweise','Ja']},
    {text:'Nimmst du vor dem Schlafen ein hochwertiges Magnesium Supplement (Bisglycinat, L-Threonat)?',options:['Nein','Teilweise','Ja']},
    {text:'Lüftest du dein Zimmer jeden Tag vor dem Schlafengehen, hältst es frei von Elektronik und unter 22°C?',options:['Nein','Teilweise','Ja']},
    {text:'Vermeidest du Koffein 10 Stunden vor dem Schlafengehen?',options:['Nein','Teilweise','Ja']},
    {text:'Ist deine letzte Mahlzeit mindestens 3 Stunden vor dem Schlafengehen?',options:['Nein','Teilweise','Ja']},
    {text:'Ist dein letzter Flüssigkeitskonsum und deine letzte Arbeitstätigkeit mindestens 2 Stunden vor dem Schlafengehen?',options:['Nein','Teilweise','Ja']},
    {text:'Schaltest du alle elektronischen Geräte 1 Stunde vor dem Schlafengehen aus?',options:['Nein','Teilweise','Ja']},
    {text:'Bekommst du morgens direkt nach dem Aufstehen 5 Minuten natürliches Licht?',options:['Nein','Teilweise','Ja']},
  ]},
  { title:'Ernährung & Supplements', questions:[
    {text:'Konsumierst du täglich mindestens folgende Menge an Protein pro Kilogramm Körpergewicht?',options:['< 1,5 g/kg','1,5 – 2 g/kg','2 g/kg']},
    {text:'Nimmst du Nahrungsergänzungsmittel, die an deine Blutwerte bzw. Defizite und speziellen Anforderungen angepasst sind?',options:['Nein','Teilweise','Ja']},
    {text:'Konsumierst du regelmäßig Getreideprodukte? (Gluten)',options:['Ja','< 1x/Monat','Nein']},
    {text:'Konsumierst du regelmäßig Milchprodukte?',options:['Ja','1–3x/Woche','Nein']},
    {text:'Trackst du deine Kalorien oder wiegst dein Essen ab?',options:['Ja','Teilweise','Nein']},
    {text:'Hast du häufiges Sodbrennen oder Verdauungsstörungen nach dem Essen?',options:['Ja','Teilweise','Nein']},
    {text:'Hast du Lebensmittelunverträglichkeiten oder -allergien, die nicht diagnostiziert wurden?',options:['Ja','Teilweise','Nein']},
    {text:'Hast du Heißhungerattacken auf Zucker oder Kohlenhydrate? Bzw. brauchst nach jeder Mahlzeit ein Dessert?',options:['Ja','Teilweise','Nein']},
    {text:'Hast du häufig/vermehrt unreine Haut?',options:['Ja','Teilweise','Nein']},
    {text:'Fühlst du dich nach den Mahlzeiten oft träge oder müde?',options:['Ja','Teilweise','Nein']},
  ]},
  { title:'Training & Bewegung', questions:[
    {text:'Machst du strukturiertes Krafttraining mit Trainingsplan? Hast du einen strukturierten Trainingsplan, der progressive Überlastung umfasst?',options:['Nein','Teilweise','Ja']},
    {text:'Wie viele Schritte machst du täglich?',type:'slider',min:0,max:20000,step:500,unit:'Schritte',thresholds:[{value:5000,score:0},{value:8000,score:1},{value:10000,score:2}]},
    {text:'Hast du aktuell oder häufig Schmerzen/Verletzungen am Bewegungsapparat?',options:['Ja','Teilweise','Nein']},
    {text:'FFMI – Fat-Free Mass Index',type:'ffmi'},
    {text:'Bist du zufrieden mit deiner Figur in Badekleidung?',options:['Nein','Teilweise','Ja']},
    {text:'Kannst du mehr als 20 Minuten laufen (nicht gehen) ohne anzuhalten und idealerweise nur durch die Nase atmen?',options:['Nein','Teilweise','Ja']},
    {text:'Oberkörper – Du kannst diese Übungen für 5–10 Wiederholungen ausführen (Klimmzug, Dips, Liegestütze):',options:['< 5 Wdh','5 – 10 Wdh','10 Wdh']},
    {text:'Unterkörper – Du kannst dein Körpergewicht mindestens 10 Wdh Kreuzheben und Kniebeugen ausführen:',options:['< 5 Wdh','5 – 10 Wdh','10 Wdh']},
    {text:'Grip Strength – Du kannst dich im "Dead Hang" an einer Stange festhalten:',options:['< 60 Sek','60 – 90 Sek','90 Sek']},
    {text:'Wie liegt deine Ruheherzfrequenz (BPM) im Verhältnis zu deinem Alter?',type:'hrv'},
  ]},
  { title:'Mindset & Stressmanagement', questions:[
    {text:'Fühlst du dich gestresst?',options:['Ja','Teilweise','Nein']},
    {text:'Hast du klare Ziele und einen klaren Plan, um diese zu erreichen?',options:['Nein','Teilweise','Ja']},
    {text:'Praktizierst du täglich Achtsamkeit, Meditation oder Atemübungen?',options:['Nein','Teilweise','Ja']},
    {text:'Verwendest du positive Selbstgespräche und bewahrst eine positive Einstellung?',options:['Nein','Teilweise','Ja']},
    {text:'Erkennst und vermeidest du systematisch Situationen, die dir unnötigen Stress bereiten?',options:['Nein','Teilweise','Ja']},
    {text:'Denkst du, dass du jeden Bereich deines Lebens selbst in der Hand hast und dich verbessern kannst?',options:['Nein','Teilweise','Ja']},
    {text:'Nutzt du bereits Strategien, um mit Stress umzugehen?',options:['Nein','Teilweise','Ja']},
    {text:'Erlebst du mehr positive als negative Emotionen?',options:['Nein','Teilweise','Ja']},
    {text:'Hast du ein starkes Netzwerk aus Freunden und Familie, auf das du dich verlassen kannst?',options:['Nein','Teilweise','Ja']},
    {text:'Bist du glücklich?',options:['Nein','Teilweise','Ja']},
  ]},
  { title:'Lifestyle & Epigenetik', questions:[
    {text:'Konsumierst du regelmäßig Alkohol?',options:['1x Monat','< 1x Monat','Nein']},
    {text:'Vermeidest du den Gebrauch von Plastikbehältern für Lebensmittel und Getränke?',options:['Nein','Teilweise','Ja']},
    {text:'Nutzt du mehrmals pro Woche eine Sauna oder schwitzt durch Sport intensiv?',options:['Nein','Teilweise','Ja']},
    {text:'Nimmst du Medikamente?',options:['Ja','Teilweise','Nein']},
    {text:'Lässt du deine Blut-, Hormon- und Mikronährstoffwerte mindestens zweimal im Jahr überprüfen?',options:['Nein','Teilweise','Ja']},
    {text:'Rauchst du oder konsumierst du Tabak, Snus oder andere härtere Drogen?',options:['Ja','Teilweise','Nein']},
    {text:'Ist dein Wohnraum baubiologisch optimiert?',options:['Nein','Teilweise','Ja']},
    {text:'Hast du Zugang zu sauberem, gefiltertem Trinkwasser?',options:['Nein','Teilweise','Ja']},
    {text:'Bist du dir bewusst und vermeidest Körperpflege- & Haushaltsprodukte, welche potenziell schädliche Stoffe enthalten?',options:['Nein','Teilweise','Ja']},
    {text:'Gehst du jeden Tag mindestens einmal groß auf die Toilette, vorzugsweise morgens?',options:['Nein','Teilweise','Ja']},
  ]},
];

// Flatten
const QS = [];
CATS.forEach((cat, ci) => {
  cat.questions.forEach((q, qi) => {
    QS.push({ ...q, ci, qi, catTitle: cat.title, catTotal: cat.questions.length });
  });
});
const TOTAL = QS.length;
const ICONS = ['✕', '↔', '✓'];

// State
const SK = 'nh-score-v3';
let S = (() => {
  try {
    const d = JSON.parse(localStorage.getItem(SK));
    if (d && Array.isArray(d.ans) && d.ans.length === TOTAL) return d;
  } catch(e) {}
  return null;
})() || fresh();

function fresh() {
  return { screen:'intro', cur:0, ans:new Array(TOTAL).fill(null), sv:{}, cv:{} };
}
function save() { try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e) {} }

// Screens
function show(name) {
  ['sIntro','sQuestion','sResults'].forEach(id => {
    document.getElementById(id).style.display = id === 's' + cap(name) ? '' : 'none';
  });
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── INTRO
function initIntro() {
  document.getElementById('introCats').innerHTML =
    CATS.map(c => `<span class="intro-cat">${c.title}</span>`).join('');
  document.getElementById('btnStart').onclick = () => {
    S.screen = 'question'; save(); show('question'); renderQ();
  };
  document.getElementById('navFill').style.width = '0%';
  document.getElementById('navCounter').textContent = '';
  document.getElementById('navExport').style.display = 'none';
  const meta = document.getElementById('introMeta');
  if (meta) meta.textContent = `${TOTAL} Fragen · ca. 5 Minuten`;

  // If previous session exists, show resume option
  const done = S.ans.filter(a=>a!==null).length;
  if (done > 0 && S.screen !== 'results') {
    const btn = document.getElementById('btnStart');
    btn.textContent = `Fortsetzen (${done}/${TOTAL}) →`;
    btn.onclick = () => { S.screen='question'; save(); show('question'); renderQ(); };
  }
}

// ── QUESTION
function renderQ() {
  const q = QS[S.cur];
  const done = S.ans.filter(a => a !== null).length;
  document.getElementById('navFill').style.width = Math.round(done/TOTAL*100) + '%';
  document.getElementById('navCounter').textContent = (S.cur+1) + ' / ' + TOTAL;
  document.getElementById('qCat').textContent = q.catTitle;
  document.getElementById('qLbl').textContent = 'Frage ' + (q.qi+1) + ' von ' + q.catTotal;

  // Dots
  const dotsEl = document.getElementById('qDots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < q.catTotal; i++) {
    const d = document.createElement('div');
    d.className = 'q-dot' + (i < q.qi ? ' done' : i === q.qi ? ' active' : '');
    dotsEl.appendChild(d);
  }

  document.getElementById('qText').textContent = q.text;

  const opts = document.getElementById('qOpts');
  opts.innerHTML = '';
  if (q.type === 'slider') buildSlider(q, opts);
  else if (q.type === 'ffmi') buildCalc(q, opts, 'ffmi');
  else if (q.type === 'hrv') buildCalc(q, opts, 'hrv');
  else buildOptions(q, opts);

  const back = document.getElementById('qBack');
  const next = document.getElementById('qNext');
  const skip = document.getElementById('qSkip');

  back.disabled = S.cur === 0;
  back.onclick = () => { S.cur--; save(); renderQ(); };
  skip.onclick = () => { if (S.cur < TOTAL-1) { S.cur++; save(); renderQ(); } };

  const isLast = S.cur === TOTAL-1;
  next.textContent = isLast ? 'Ergebnis ansehen →' : 'Weiter →';
  next.disabled = S.ans[S.cur] === null && !['slider','ffmi','hrv'].includes(q.type);
  next.onclick = () => {
    if (isLast) { S.screen='results'; save(); show('results'); renderResults(); }
    else { S.cur++; save(); renderQ(); }
  };
}

function buildOptions(q, container) {
  const saved = S.ans[S.cur];
  q.options.forEach((lbl, idx) => {
    const row = document.createElement('div');
    row.className = 'q-option' + (saved === idx ? ' sel-' + idx : '');

    const icon = document.createElement('div');
    icon.className = 'q-icon';
    icon.textContent = ICONS[idx] || '·';

    const label = document.createElement('span');
    label.className = 'q-label';
    label.textContent = lbl;

    row.appendChild(icon); row.appendChild(label);
    row.onclick = () => {
      S.ans[S.cur] = idx; save();
      renderQ();
      setTimeout(() => {
        if (S.cur < TOTAL-1) { S.cur++; save(); renderQ(); }
      }, 280);
    };
    container.appendChild(row);
  });
}

function buildSlider(q, container) {
  const key = S.cur;
  const val = S.sv[key] !== undefined ? S.sv[key] : Math.round((q.min+q.max)/2);
  const sc = sScore(val, q.thresholds);
  const cls = sc===2?'good':sc===1?'medium':'bad';

  const wrap = document.createElement('div');
  wrap.className = 'q-slider-wrap';
  wrap.innerHTML = `
    <div class="q-slider-val ${cls}" id="sv">${val.toLocaleString('de')} ${q.unit}</div>
    <input type="range" class="q-range" id="si" min="${q.min}" max="${q.max}" step="${q.step}" value="${val}">
    <div class="q-slider-lbls"><span>${q.min.toLocaleString('de')}</span><span>${q.max.toLocaleString('de')}</span></div>
    <div class="q-slider-hint" id="sh">${sHint(val,q.thresholds)}</div>
  `;
  container.appendChild(wrap);

  const inp = wrap.querySelector('#si');
  fillSlider(inp, q.min, q.max, val);

  inp.addEventListener('input', () => {
    const v = parseInt(inp.value);
    S.sv[key] = v; const s2 = sScore(v,q.thresholds); const c2 = s2===2?'good':s2===1?'medium':'bad';
    wrap.querySelector('#sv').textContent = v.toLocaleString('de') + ' ' + q.unit;
    wrap.querySelector('#sv').className = 'q-slider-val '+c2;
    wrap.querySelector('#sh').textContent = sHint(v,q.thresholds);
    fillSlider(inp,q.min,q.max,v);
    S.ans[S.cur] = s2; save();
    document.getElementById('qNext').disabled = false;
  });
  if (S.ans[S.cur] === null) { S.ans[S.cur] = sc; save(); }
  document.getElementById('qNext').disabled = false;
}

function fillSlider(el, min, max, val) {
  const p = ((val-min)/(max-min))*100;
  el.style.background = `linear-gradient(90deg,var(--neon) ${p}%,var(--border) ${p}%)`;
}
function sScore(v,t) { return v>=t[2].value?2:v>=t[1].value?1:0; }
function sHint(v,t)  { return v>=t[2].value?'Ziel erreicht':v>=t[1].value?'Annähernd am Ziel':'Mehr Bewegung empfohlen'; }

function buildCalc(q, container, type) {
  const key = type+'_'+S.cur;
  const saved = S.cv[key] || { gender:'M' };
  const wrap = document.createElement('div');
  wrap.className = 'q-calc-wrap';

  if (type === 'ffmi') {
    wrap.innerHTML = `
      <div class="q-calc-grid">
        <div class="q-calc-field"><label>Geschlecht</label>
          <div class="q-calc-gender">
            <button id="gM" class="${saved.gender!=='F'?'active':''}">M</button>
            <button id="gF" class="${saved.gender==='F'?'active':''}">F</button>
          </div></div>
        <div class="q-calc-field"><label>Größe (cm)</label><input type="number" id="cH" min="140" max="220" placeholder="175" value="${saved.height||''}"></div>
        <div class="q-calc-field"><label>Gewicht (kg)</label><input type="number" id="cW" min="40" max="200" placeholder="80" value="${saved.weight||''}"></div>
        <div class="q-calc-field"><label>Körperfett (%)</label><input type="number" id="cBF" min="3" max="50" placeholder="15" value="${saved.bf||''}"></div>
      </div>
      <div class="q-calc-result" id="cRes">
        <span class="q-calc-result-val" id="cVal">${saved.result||'–'}</span>
        <span class="q-calc-result-lbl" id="cLbl">${saved.label||'FFMI'}</span>
      </div>`;

    const calc = () => {
      const d = S.cv[key] || { gender:'M' };
      d.height = parseFloat(wrap.querySelector('#cH').value)||null;
      d.weight = parseFloat(wrap.querySelector('#cW').value)||null;
      d.bf     = parseFloat(wrap.querySelector('#cBF').value)||null;
      S.cv[key] = d;
      if (!d.height||!d.weight||!d.bf) return;
      const lbm = d.weight*(1-d.bf/100), h=d.height/100, ffmi=lbm/(h*h);
      const iF = d.gender==='F';
      let sc,lbl,cls;
      if (ffmi>=(iF?17:20)) { sc=2;lbl='Sehr gut';cls='good'; }
      else if (ffmi>=(iF?15:18)) { sc=1;lbl='Durchschnitt';cls='medium'; }
      else { sc=0;lbl='Verbesserungsbedarf';cls='bad'; }
      d.result=ffmi.toFixed(1); d.label=lbl;
      wrap.querySelector('#cVal').textContent=ffmi.toFixed(1);
      wrap.querySelector('#cLbl').textContent=lbl;
      wrap.querySelector('#cRes').className='q-calc-result '+cls;
      S.ans[S.cur]=sc; save();
      document.getElementById('qNext').disabled=false;
    };
    wrap.querySelector('#gM').onclick=()=>{ const d=S.cv[key]||{};d.gender='M';S.cv[key]=d; wrap.querySelector('#gM').classList.add('active'); wrap.querySelector('#gF').classList.remove('active'); calc(); };
    wrap.querySelector('#gF').onclick=()=>{ const d=S.cv[key]||{};d.gender='F';S.cv[key]=d; wrap.querySelector('#gF').classList.add('active'); wrap.querySelector('#gM').classList.remove('active'); calc(); };
    wrap.querySelectorAll('input').forEach(i=>i.addEventListener('input',calc));

  } else { // hrv
    wrap.innerHTML = `
      <div class="q-calc-grid">
        <div class="q-calc-field"><label>Ruhepuls (BPM)</label><input type="number" id="cBPM" min="30" max="120" placeholder="60" value="${saved.bpm||''}"></div>
        <div class="q-calc-field"><label>Alter</label><input type="number" id="cAge" min="10" max="100" placeholder="30" value="${saved.age||''}"></div>
      </div>
      <div class="q-calc-result" id="cRes">
        <span class="q-calc-result-val" id="cVal">${saved.result||'–'}</span>
        <span class="q-calc-result-lbl" id="cLbl">${saved.label||'Ruhepuls-Bewertung'}</span>
      </div>`;

    const calc = () => {
      const d=S.cv[key]||{};
      d.bpm=parseFloat(wrap.querySelector('#cBPM').value)||null;
      d.age=parseFloat(wrap.querySelector('#cAge').value)||null;
      S.cv[key]=d;
      if (!d.bpm||!d.age) return;
      let sc,lbl,cls;
      if (d.bpm<60){sc=2;lbl='Ausgezeichnet – Athletisch';cls='good';}
      else if (d.bpm<=72){sc=1;lbl='Gut – im Normalbereich';cls='medium';}
      else{sc=0;lbl='Verbesserungsbedarf';cls='bad';}
      d.result=d.bpm+' BPM'; d.label=lbl;
      wrap.querySelector('#cVal').textContent=d.bpm+' BPM';
      wrap.querySelector('#cLbl').textContent=lbl;
      wrap.querySelector('#cRes').className='q-calc-result '+cls;
      S.ans[S.cur]=sc; save();
      document.getElementById('qNext').disabled=false;
    };
    wrap.querySelectorAll('input').forEach(i=>i.addEventListener('input',calc));
  }

  container.appendChild(wrap);
  if (S.ans[S.cur] !== null) document.getElementById('qNext').disabled = false;
  else document.getElementById('qNext').disabled = false;
}

// ── RESULTS
function renderResults() {
  const total = S.ans.reduce((s,a)=>s+(a||0),0);
  const max   = TOTAL*2;
  const pct   = Math.round(total/max*100);

  document.getElementById('navFill').style.width = '100%';
  document.getElementById('navCounter').textContent = 'Fertig';
  document.getElementById('navExport').style.display = 'block';

  document.getElementById('rScore').textContent = total;
  document.getElementById('rScoreMax').textContent = '/' + max;
  document.getElementById('rSub').textContent = scoreLabel(pct);

  // Animate gauge after paint
  setTimeout(() => {
    const fill = document.getElementById('rGaugeFill');
    if (fill) fill.style.width = pct + '%';
  }, 100);

  const bd = document.getElementById('rBreakdown');
  bd.innerHTML = '';
  let off = 0;
  CATS.forEach(cat => {
    const n  = cat.questions.length;
    const sc = S.ans.slice(off,off+n).reduce((s,a)=>s+(a||0),0);
    const catMax = n * 2;
    const p  = Math.round(sc/catMax*100);
    off += n;
    const card = document.createElement('div');
    card.className = 'r-cat';
    card.innerHTML = `
      <span class="r-cat-name">${cat.title}</span>
      <div class="r-cat-score">${sc}<span>/${catMax}</span></div>
      <div class="r-bar-track"><div class="r-bar-fill" style="width:0%" data-w="${p}"></div></div>
      <span class="r-pct">${p}%</span>`;
    bd.appendChild(card);
  });
  // Animate bars
  setTimeout(() => {
    bd.querySelectorAll('.r-bar-fill').forEach(el => el.style.width = el.dataset.w + '%');
  }, 150);

  document.getElementById('rExport').onclick = () => doPDF(total, pct);
  document.getElementById('rRestart').onclick = reset;
}

function scoreLabel(pct) {
  if (pct >= 85) return 'Hervorragend — du lebst auf höchstem Niveau.';
  if (pct >= 70) return 'Sehr gut — du hast eine starke Basis.';
  if (pct >= 55) return 'Gut — gezieltes Optimieren bringt dich weiter.';
  if (pct >= 40) return 'Ausbaufähig — es gibt klares Potenzial.';
  return 'Hier liegt Wachstumspotenzial — lass uns arbeiten.';
}

function doPDF(score, pct) {
  const w = window.open('','_blank');
  if (!w) return;
  const date = new Date().toLocaleDateString('de-DE');
  let off=0, rows='';
  CATS.forEach(cat => {
    const n=cat.questions.length;
    const sc=S.ans.slice(off,off+n).reduce((s,a)=>s+(a||0),0);
    rows += `<tr><td>${cat.title}</td><td>${sc} / ${n*2}</td><td>${Math.round(sc/(n*2)*100)}%</td></tr>`;
    off+=n;
  });
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>NH Score Report</title>
    <style>body{font-family:system-ui,sans-serif;padding:40px;color:#111;max-width:580px;margin:0 auto}
    h1{font-size:24px;font-weight:700;margin-bottom:4px}p{color:#666;margin-bottom:28px;font-size:14px}
    .sc{font-size:52px;font-weight:700;letter-spacing:-0.04em;margin:12px 0 4px}
    .sub{font-size:14px;color:#666;margin-bottom:32px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th{text-align:left;padding:8px 0;border-bottom:2px solid #111;font-size:12px;text-transform:uppercase;letter-spacing:0.06em}
    td{padding:10px 0;border-bottom:1px solid #eee}
    @media print{body{padding:16px}}</style></head><body>
    <h1>NH Score Report</h1><p>${date}</p>
    <div class="sc">${score}</div>
    <div class="sub">von ${TOTAL*2} Punkten · ${pct}%</div>
    <table><tr><th>Bereich</th><th>Punkte</th><th>Score</th></tr>${rows}</table>
    <script>window.print();<\/script></body></html>`);
  w.document.close();
}

function reset() {
  S = fresh(); save();
  show('intro'); initIntro();
  document.getElementById('navExport').style.display = 'none';
  document.getElementById('navCounter').textContent = '';
  document.getElementById('navFill').style.width = '0%';
}

document.getElementById('navReset').onclick = () => { if (confirm('Assessment zurücksetzen?')) reset(); };
document.getElementById('navExport').onclick = () => {
  const total=S.ans.reduce((s,a)=>s+(a||0),0);
  doPDF(total, Math.round(total/(TOTAL*2)*100));
};

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (S.screen !== 'question') return;
  const q = QS[S.cur];
  if (!q || q.type) return; // skip for sliders/calcs
  if (['1','2','3'].includes(e.key)) {
    const idx = parseInt(e.key) - 1;
    if (q.options && idx < q.options.length) {
      S.ans[S.cur] = idx; save();
      renderQ();
      setTimeout(() => {
        if (S.cur < TOTAL-1) { S.cur++; save(); renderQ(); }
      }, 280);
    }
  }
  if (e.key === 'Enter') {
    const nextBtn = document.getElementById('qNext');
    if (nextBtn && !nextBtn.disabled) nextBtn.click();
  }
  if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
    const backBtn = document.getElementById('qBack');
    if (backBtn && !backBtn.disabled) backBtn.click();
  }
});

// Init
initIntro();
show(S.screen);
if (S.screen === 'question') renderQ();
if (S.screen === 'results')  renderResults();
</script>
</body>
</html>
